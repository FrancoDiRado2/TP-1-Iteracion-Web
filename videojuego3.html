<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#fc3737">
    <link rel="apple-touch-icon" href="images/icon-192.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Globos Explosivos - La Primarca</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #0314ac;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            position: relative;
        }

        .game-container {
            margin-top: 20px;
            border: 4px solid #fc3737;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
            margin-bottom: 50px; /* Para que el footer no tape el juego */
        }

        .header {
            background-color: #0314ac;
            color: white;
            text-align: center;
            padding: 20px;
            width: 100%;
        }

        .nav-container {
            display: flex;
            justify-content: space-around;
            background-color: #f0f0f0;
            padding: 10px;
            width: 100%;
            flex-wrap: wrap; /* Para que los botones no se aprieten */
        }

        .nav-button {
            padding: 15px 30px;
            font-size: 18px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 5px;
        }

        .inicio { background-color: #fc3737; }
        .videojuegos { background-color: #6c5ce7; }
        .recomendaciones { background-color: #00b894; }
        .contacto { background-color: #0984e3; }
        .btn-sensor { background-color: #e67e22; }

        .nav-button:hover {
            opacity: 0.9;
            transform: scale(1.05);
        }

        .footer {
            background-color: #0314ac;
            color: white;
            text-align: center;
            padding: 2px;
            width: 100%;
            position: fixed;
            bottom: 0;
            left: 0;
            z-index: 1001; /* Asegura que quede siempre arriba */
        }

        /* Estilos para el panel flotante del ranking */
        .ranking-panel {
            position: absolute;
            top: 150px;
            right: 20px;
            background-color: rgba(3, 20, 172, 0.9);
            border: 3px solid #00ff00;
            border-radius: 10px;
            padding: 15px;
            color: white;
            width: 200px;
            box-shadow: 0 0 15px rgba(0,0,0,0.7);
            z-index: 1000;
        }
        
        .ranking-panel h3 {
            margin-top: 0;
            text-align: center;
            border-bottom: 2px solid white;
            padding-bottom: 8px;
            font-size: 20px;
        }
        
        .ranking-panel ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        
        .ranking-panel li {
            margin-bottom: 8px;
            font-size: 16px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Globos Explosivos</h1>
    </div>

    <div class="nav-container">
        <a href="index.html" class="nav-button inicio">
            <span class="icon">🏠</span> Inicio
        </a>
        <a href="videojuegos.html" class="nav-button videojuegos">
            <span class="icon">🎮</span> Videojuegos
        </a>
        <a href="recomendaciones.html" class="nav-button recomendaciones">
            <span class="icon">⭐</span> Recomendaciones
        </a>
        <a href="contacto.html" class="nav-button contacto">
            <span class="icon">📧</span> Contacto
        </a>
        <button id="btn-gyro" class="nav-button btn-sensor">
            <span class="icon">📱</span> Activar Movimiento (Celular)
        </button>
    </div>

    <div class="ranking-panel">
        <h3>Ranking Global</h3>
        <ul id="ranking-list">
            <li>Conectando al servidor...</li>
        </ul>
    </div>

    <div class="game-container" id="game"></div>

    <div class="footer">
        <p>La Primarca - El futuro del gaming</p>
    </div>

    <script>
        // ==========================================
        // LÓGICA DEL GIROSCOPIO (TP3)
        // ==========================================
        let tiltX = 0; 
        let gyroActivado = false;

        document.getElementById('btn-gyro').addEventListener('click', function() {
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(permissionState => {
                        if (permissionState === 'granted') {
                            activarSensores();
                            this.style.display = 'none'; 
                        }
                    })
                    .catch(console.error);
            } else {
                activarSensores();
                this.style.display = 'none'; 
            }
        });

        function activarSensores() {
            window.addEventListener('deviceorientation', function(event) {
                tiltX = event.gamma; // Inclinación izquierda/derecha
            });
            gyroActivado = true;
            console.log("[PWA] Control por giroscopio activado. Gamma:", tiltX);
        }

        // ==========================================
        // CÓDIGO DE PHASER (EL JUEGO)
        // ==========================================
        const config = {
            type: Phaser.AUTO,
            width: 800,
            height: 600,
            physics: {
                default: 'arcade',
                arcade: {
                    gravity: { y: 0 },
                    debug: false
                }
            },
            scene: {
                preload: preload,
                create: create,
                update: update
            }
        };

        const game = new Phaser.Game(config);

        let player;
        let balloons;
        let projectiles;
        let score = 0;
        let lives = 3;
        let scoreText;
        let livesText;
        let gameOver = false;
        let canShoot = true;
        let shootDelay = 500;
        const MAX_BALLOONS = 5;
        const VICTORY_SCORE = 30;

        function preload() {
            this.load.image('player', 'images/UltraMarine.png');
            this.load.image('balloon', 'images/spore.png');
            this.load.image('background', 'images/Fondo.png');
            this.load.image('projectile', 'https://labs.phaser.io/assets/sprites/bullet.png');
        }

        function create() {
            if (typeof gameAnalytics !== 'undefined') {
                gameAnalytics.registrarNuevaPartida();
            }

            if (typeof wsManager !== 'undefined') {
                wsManager.conectar();
            }

            this.add.image(400, 300, 'background');

            player = this.physics.add.sprite(400, 500, 'player');
            player.setCollideWorldBounds(true);
            player.setScale(2.8);
            player.body.setSize(40, 40);

            projectiles = this.physics.add.group();
            balloons = this.physics.add.group();

            this.balloonTimer = this.time.addEvent({
                delay: 1000,
                callback: createBalloon,
                callbackScope: this,
                loop: true
            });

            scoreText = this.add.text(16, 16, 'Score: 0/30', { 
                fontSize: '32px', fill: '#fff', stroke: '#000', strokeThickness: 4
            });

            livesText = this.add.text(16, 56, 'Lives: 3', { 
                fontSize: '32px', fill: '#fff', stroke: '#000', strokeThickness: 4
            });

            // Agregamos toque en la pantalla para disparar (PWA friendly)
            this.add.text(500, 520, 'Teclado: Flechas + Espacio\nCelular: Inclinar + Tocar', {
                fontSize: '20px', fill: '#fff', stroke: '#000', strokeThickness: 3, align: 'right'
            });

            this.input.on('pointerdown', function (pointer) {
                if (canShoot && !gameOver) {
                    shootProjectile(this);
                    canShoot = false;
                    this.time.delayedCall(shootDelay, () => {
                        canShoot = true;
                    });
                }
            }, this);

            this.projectileCollider = this.physics.add.overlap(projectiles, balloons, popBalloon, null, this);

            this.playerCollider = this.physics.add.overlap(player, balloons, (player, balloon) => {
                balloon.destroy();
                loseLife(this);
            });

            this.spaceKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);
        }

        function update() {
            if (gameOver) {
                player.setVelocityX(0);
                return;
            }

            // Movimiento híbrido (Teclado o Giroscopio)
            const cursors = this.input.keyboard.createCursorKeys();
            let isMovingWithKeyboard = false;
            
            if (cursors.left.isDown) {
                player.setVelocityX(-300);
                isMovingWithKeyboard = true;
            } else if (cursors.right.isDown) {
                player.setVelocityX(300);
                isMovingWithKeyboard = true;
            } 
            
            if (!isMovingWithKeyboard) {
                if (gyroActivado) {
                    // Zona muerta para que no tiemble
                    if (tiltX < -5) {
                        player.setVelocityX(-300);
                    } else if (tiltX > 5) {
                        player.setVelocityX(300);
                    } else {
                        player.setVelocityX(0);
                    }
                } else {
                    player.setVelocityX(0);
                }
            }

            if (Phaser.Input.Keyboard.JustDown(this.spaceKey) && canShoot) {
                shootProjectile(this);
                canShoot = false;
                this.time.delayedCall(shootDelay, () => {
                    canShoot = true;
                });
            }

            balloons.getChildren().forEach(balloon => {
                if (balloon.y > 580) {
                    balloonGroundCollision(this, balloon);
                }
            });

            if (score >= VICTORY_SCORE) {
                gameOver = true;
                this.balloonTimer.remove();
                showEndGameStats(this, true);
            }

            projectiles.getChildren().forEach(projectile => {
                if (projectile.y < 0) {
                    projectile.destroy();
                }
            });
        }

        function shootProjectile(scene) {
            const projectile = projectiles.create(player.x, player.y - 20, 'projectile');
            projectile.setScale(2.0);
            projectile.setVelocityY(-400);

            if (typeof gameAnalytics !== 'undefined') {
                gameAnalytics.trackEvent('DISPARO_REALIZADO');
            }
        }

        function createBalloon() {
            if (gameOver) return;
            if (balloons.getChildren().length >= MAX_BALLOONS) return;
            const x = Phaser.Math.Between(50, 750);
            const balloon = balloons.create(x, 0, 'balloon');
            balloon.setScale(2.0);
            balloon.setVelocityY(90);
            balloon.body.setSize(20, 20);
        }

        function showEndGameStats(scene, isVictory) {
            if (typeof gameAnalytics !== 'undefined') {
                gameAnalytics.trackEvent(isVictory ? 'PARTIDA_GANADA' : 'PARTIDA_PERDIDA');
            }
            scene.projectileCollider.active = false;
            scene.playerCollider.active = false;
            const overlay = scene.add.rectangle(400, 300, 800, 600, 0x000000, 0.7);
            
            const title = scene.add.text(400, 200, isVictory ? '¡Victoria!' : 'Game Over!', {
                fontSize: '64px', fill: isVictory ? '#00ff00' : '#ff0000', stroke: '#000', strokeThickness: 6
            }).setOrigin(0.5);

            const stats = scene.add.text(400, 300, 
                `Estadísticas Finales:\n\nGlobos Destruidos: ${score}/30\nVidas Restantes: ${lives}`, {
                fontSize: '32px', fill: '#ffffff', stroke: '#000', strokeThickness: 4, align: 'center'
            }).setOrigin(0.5);

            const restartButton = scene.add.text(400, 400, 'Toca aquí o ESPACIO para reiniciar', {
                fontSize: '24px', fill: '#ffffff', stroke: '#000', strokeThickness: 3
            }).setOrigin(0.5);

            scene.input.keyboard.once('keydown-SPACE', () => { location.reload(); });
            scene.input.once('pointerdown', () => { location.reload(); });
        }

        function loseLife(scene) {
            lives--;
            livesText.setText('Lives: ' + lives);
            if (typeof gameAnalytics !== 'undefined') { gameAnalytics.trackEvent('VIDA_PERDIDA'); }
            if (lives <= 0) {
                gameOver = true;
                scene.balloonTimer.remove();
                showEndGameStats(scene, false);
            }
        }

        function popBalloon(projectile, balloon) {
            balloon.destroy();
            projectile.destroy();
            score += 1;
            scoreText.setText('Score: ' + score + '/30');
            if (typeof gameAnalytics !== 'undefined') { gameAnalytics.trackEvent('GLOBO_DESTRUIDO'); }
            if (typeof wsManager !== 'undefined') { wsManager.enviarPuntaje(score); }
        }

        function balloonGroundCollision(scene, balloon) {
            balloon.destroy();
            loseLife(scene);
        }
    </script>
    <script src="script.js"></script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log('[PWA] Service Worker registrado correctamente.', reg))
                .catch(err => console.log('[PWA] Error al registrar el Service Worker.', err));
            });
        }
    </script>
</body>
</html>
