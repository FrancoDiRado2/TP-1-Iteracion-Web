<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Globos Explosivos - La Primarca</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #0314ac;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .game-container {
            margin-top: 20px;
            border: 4px solid #fc3737;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }

        .header {
            background-color: #0314ac;
            color: white;
            text-align: center;
            padding: 20px;
            width: 100%;
        }

        .nav-container {
            display: flex;
            justify-content: space-around;
            background-color: #f0f0f0;
            padding: 10px;
            width: 100%;
        }

        .nav-button {
            padding: 15px 30px;
            font-size: 18px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .inicio {
            background-color: #fc3737;
        }

        .videojuegos {
            background-color: #6c5ce7;
        }

        .recomendaciones {
            background-color: #00b894;
        }

        .contacto {
            background-color: #0984e3;
        }

        .nav-button:hover {
            opacity: 0.9;
            transform: scale(1.05);
        }

        .footer {
            background-color: #0314ac;
            color: white;
            text-align: center;
            padding: 2px;
            width: 100%;
            position: fixed;
            bottom: 0;
            left: 0;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Globos Explosivos</h1>
    </div>

    <div class="nav-container">
        <a href="index.html" class="nav-button inicio">
            <span class="icon">🏠</span>
            Inicio
        </a>
        <a href="videojuegos.html" class="nav-button videojuegos">
            <span class="icon">🎮</span>
            Videojuegos
        </a>
        <a href="recomendaciones.html" class="nav-button recomendaciones">
            <span class="icon">⭐</span>
            Recomendaciones
        </a>
        <a href="contacto.html" class="nav-button contacto">
            <span class="icon">📧</span>
            Contacto
        </a>
    </div>

    <div class="game-container" id="game"></div>

    <div class="footer">
        <p>La Primarca - El futuro del gaming</p>
    </div>

    <script>
        const config = {
            type: Phaser.AUTO,
            width: 800,
            height: 600,
            physics: {
                default: 'arcade',
                arcade: {
                    gravity: { y: 0 },
                    debug: false
                }
            },
            scene: {
                preload: preload,
                create: create,
                update: update
            }
        };

        const game = new Phaser.Game(config);

        let player;
        let balloons;
        let projectiles;
        let score = 0;
        let lives = 3;
        let scoreText;
        let livesText;
        let gameOver = false;
        let canShoot = true;
        let shootDelay = 500;
        const MAX_BALLOONS = 5;
        const VICTORY_SCORE = 30;

        function preload() {
            this.load.image('player', 'images/UltraMarine.png');
            this.load.image('balloon', 'images/spore.png');
            this.load.image('background', 'images/Fondo.png');
            this.load.image('projectile', 'https://labs.phaser.io/assets/sprites/bullet.png');
        }

        function create() {
            // Add background
            this.add.image(400, 300, 'background');

            // Create player
            player = this.physics.add.sprite(400, 500, 'player');
            player.setCollideWorldBounds(true);
            player.setScale(2.8);
            player.body.setSize(40, 40);

            // Create projectile group
            projectiles = this.physics.add.group();

            // Create balloon group
            balloons = this.physics.add.group();

            // Create balloons periodically
            this.balloonTimer = this.time.addEvent({
                delay: 1000,
                callback: createBalloon,
                callbackScope: this,
                loop: true
            });

            // Add score text
            scoreText = this.add.text(16, 16, 'Score: 0/30', { 
                fontSize: '32px', 
                fill: '#fff',
                stroke: '#000',
                strokeThickness: 4
            });

            // Add lives text
            livesText = this.add.text(16, 56, 'Lives: 3', { 
                fontSize: '32px', 
                fill: '#fff',
                stroke: '#000',
                strokeThickness: 4
            });

            // Add instructions text
            this.add.text(500, 520, 'Controles:\nFlechas: Movimiento\nEspacio: Disparar', {
                fontSize: '20px',
                fill: '#fff',
                stroke: '#000',
                strokeThickness: 3,
                align: 'right'
            });

            // Add collision between projectiles and balloons
            this.projectileCollider = this.physics.add.overlap(projectiles, balloons, popBalloon, null, this);

            // Add collision between player and balloons
            this.playerCollider = this.physics.add.overlap(player, balloons, (player, balloon) => {
                balloon.destroy();
                loseLife(this);
            });

            // Add space key for shooting
            this.spaceKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);
        }

        function update() {
            if (gameOver) {
                player.setVelocityX(0);
                return;
            }

            // Player movement
            const cursors = this.input.keyboard.createCursorKeys();
            
            if (cursors.left.isDown) {
                player.setVelocityX(-300);
            } else if (cursors.right.isDown) {
                player.setVelocityX(300);
            } else {
                player.setVelocityX(0);
            }

            // Shooting mechanics
            if (Phaser.Input.Keyboard.JustDown(this.spaceKey) && canShoot) {
                shootProjectile(this);
                canShoot = false;
                this.time.delayedCall(shootDelay, () => {
                    canShoot = true;
                });
            }

            // Check if any balloon reached the bottom
            balloons.getChildren().forEach(balloon => {
                if (balloon.y > 580) {
                    balloonGroundCollision(this, balloon);
                }
            });

            // Check for victory
            if (score >= VICTORY_SCORE) {
                gameOver = true;
                this.balloonTimer.remove();
                showEndGameStats(this, true);
            }

            // Remove projectiles that are out of bounds
            projectiles.getChildren().forEach(projectile => {
                if (projectile.y < 0) {
                    projectile.destroy();
                }
            });
        }

        function shootProjectile(scene) {
            const projectile = projectiles.create(player.x, player.y - 20, 'projectile');
            projectile.setScale(2.0);
            projectile.setVelocityY(-400);
        }

        function createBalloon() {
            if (gameOver) return;
            
            if (balloons.getChildren().length >= MAX_BALLOONS) return;

            const x = Phaser.Math.Between(50, 750);
            const balloon = balloons.create(x, 0, 'balloon');
            balloon.setScale(2.0);
            balloon.setVelocityY(90);
            balloon.body.setSize(20, 20);
        }

        function showEndGameStats(scene, isVictory) {
            // Desactivar colisiones
            scene.projectileCollider.active = false;
            scene.playerCollider.active = false;
            
            // Crear un fondo semi-transparente
            const overlay = scene.add.rectangle(400, 300, 800, 600, 0x000000, 0.7);
            
            // Título
            const title = scene.add.text(400, 200, isVictory ? '¡Victoria!' : 'Game Over!', {
                fontSize: '64px',
                fill: isVictory ? '#00ff00' : '#ff0000',
                stroke: '#000',
                strokeThickness: 6
            }).setOrigin(0.5);

            // Estadísticas
            const stats = scene.add.text(400, 300, 
                `Estadísticas Finales:\n\n` +
                `Globos Destruidos: ${score}/30\n` +
                `Vidas Restantes: ${lives}`, {
                fontSize: '32px',
                fill: '#ffffff',
                stroke: '#000',
                strokeThickness: 4,
                align: 'center'
            }).setOrigin(0.5);

            // Botón de reinicio
            const restartButton = scene.add.text(400, 400, 'Presiona ESPACIO para reiniciar', {
                fontSize: '24px',
                fill: '#ffffff',
                stroke: '#000',
                strokeThickness: 3
            }).setOrigin(0.5);

            // Agregar evento para reiniciar
            scene.input.keyboard.once('keydown-SPACE', () => {
                location.reload();
            });
        }

        function loseLife(scene) {
            lives--;
            livesText.setText('Lives: ' + lives);
            
            if (lives <= 0) {
                gameOver = true;
                scene.balloonTimer.remove();
                showEndGameStats(scene, false);
            }
        }

        function popBalloon(projectile, balloon) {
            balloon.destroy();
            projectile.destroy();
            score += 1;
            scoreText.setText('Score: ' + score + '/30');
        }

        function balloonGroundCollision(scene, balloon) {
            balloon.destroy();
            loseLife(scene);
        }
    </script>
</body>
</html>
