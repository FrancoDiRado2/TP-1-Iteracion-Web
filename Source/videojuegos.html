<!DOCTYPE html>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        .header {
            background-color: #0314ac;
            color: white;
            text-align: center;
            padding: 20px;
        }

        .nav-container {
            display: flex;
            justify-content: space-around;
            background-color: #f0f0f0;
            padding: 10px;
        }

        .nav-button {
            padding: 15px 30px;
            font-size: 18px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .inicio { background-color: #ff6b6b; }
        .videojuegos { background-color: #6c5ce7; }
        .recomendaciones { background-color: #00b894; }
        .contacto { background-color: #0984e3; }

        .nav-button:hover {
            opacity: 0.9;
            transform: scale(1.05);
        }

        .games-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            padding: 20px;
            margin-bottom: 60px;
        }

        .game-card {
            background-color: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transition: transform 0.3s;
            text-decoration: none;
            color: inherit;
        }

        .game-card:hover {
            transform: translateY(-5px);
        }

        .game-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .game-card h3 {
            margin: 10px 0;
            color: #2d3436;
        }

        .game-card p {
            color: #636e72;
            line-height: 1.6;
        }

        .footer {
            background-color: #0314ac;
            color: white;
            text-align: center;
            padding: 20px;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>
